<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オンラインショップ へ 転送中 - カウチポテト</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #f6eede;
            color: #1f2937;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
        }
        .loader {
            width: 40px;
            height: 40px;
            margin: 0 auto 20px;
            border: 3px solid #f3f4f6;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            font-size: 0.9rem;
            color: #6b7280;
        }
        .target-path {
            font-family: monospace;
            display: block;
            margin-top: 10px;
            color: #3b82f6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="loader"></div>
    <div class="message">
        オンラインショップへ転送しています
        <span id="display-path" class="target-path">読み込み中...</span>
    </div>
</div>

<script>
    (function() {
        const baseUrl = "https://bdgrjoop4zvap6ztqm5b.stores.jp/";
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');

        let finalUrl = baseUrl;

        if (data) {
            const hasExtension = data.includes('.');
            const hasPath = data.includes('/');

            if (hasExtension || hasPath) {
                finalUrl += data;
            } else {
                finalUrl += data + ".html";
            }
        }

        document.getElementById('display-path').innerText = finalUrl.replace("https://", "");

        setTimeout(() => {
            window.location.replace(finalUrl);
        }, 800);
    })();
</script>

</body>
</html>
